# https://developers.home-assistant.io/docs/add-ons/configuration
name: EchonetGO
version: "0.1.33"
slug: echonetgo
description: ECHONET Lite polling service in Go. Polls devices from YAML config, caches state, publishes sensors via MQTT auto-discovery for Home Assistant.
url: "https://github.com/styygeli/EchonetGO"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
hassio_api: true
host_network: true
map:
  - config:rw
mqtt: auto
options:
  config_path: "/config/echonetgo/config.yaml"
  devices_path: ""
  log_level: "info"
schema:
  config_path: "str?"
  devices_path: "str?"
  log_level: "str?"

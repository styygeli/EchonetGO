name: EchonetGO
description: ECHONET Lite polling service in Go. Polls devices, publishes HA entities via MQTT, and serves Prometheus metrics.
config:
  config_path:
    name: Config file path
    description: Full path to the main EchonetGO config file (YAML), e.g. /config/echonetgo/config.yaml
  devices_path:
    name: Devices file path
    description: Optional path to a devices YAML/JSON file. Leave empty if devices are in the main config.
  log_level:
    name: Log level
    description: Log verbosity (debug, info, warn, error)

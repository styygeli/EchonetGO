# EchonetGO configuration example.
# Copy to etc/config.yaml or set ECHONET_CONFIG to your file path.
#
# Environment variables override file values:
#   ECHONET_LISTEN_ADDR, ECHONET_SCRAPE_TIMEOUT_SEC,
#   ECHONET_STRICT_SOURCE_PORT_3610,
#   ECHONET_DEVICES_PATH, ECHONET_SPECS_DIR, ECHONET_DEVICES (JSON)
#   MQTT_BROKER, MQTT_USER, MQTT_PASS, MQTT_TOPIC_PREFIX, MQTT_DISCOVERY_PREFIX

listen_addr: ":9191"
scrape_timeout_sec: 15

# Keep source UDP port fixed to 3610 (recommended for devices that only reply
# to requests sourced from port 3610).
strict_source_port_3610: true

# Path to devices list (YAML or JSON). Optional if devices are listed below or in ECHONET_DEVICES.
devices_path: "etc/devices.yaml"

# Directory of device class specs (one .yaml per class). Default: etc/specs
specs_dir: "etc/specs"

# Optional: define devices inline instead of devices_path
# devices:
#   - name: epcube_battery
#     ip: 192.168.1.10
#     class: storage_battery
#     scrape_interval: 2m
#   - name: living_ac
#     ip: 192.168.1.20
#     class: home_ac
#   - name: breaker_panel
#     ip: 192.168.1.30
#     class: power_dist_board
#   - name: panel_solar
#     ip: 192.168.1.30
#     class: home_solar
#   - name: water_meter
#     ip: 192.168.1.30
#     class: water_flow_meter
#   - name: gas_meter
#     ip: 192.168.1.30
#     class: gas_meter

# MQTT publishing for Home Assistant auto-discovery.
# Leave broker empty (or omit mqtt block) to disable.
# When running as an HA add-on with mqtt: auto, the broker/credentials
# are injected automatically via MQTT_HOST/MQTT_USERNAME/MQTT_PASSWORD.
# mqtt:
#   broker: "tcp://localhost:1883"
#   username: ""
#   password: ""
#   topic_prefix: "echonetgo"         # state/availability published here
#   discovery_prefix: "homeassistant" # HA MQTT auto-discovery prefix

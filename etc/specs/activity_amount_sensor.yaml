# Activity amount sensor - ECHONET Object 0x002A01
# Sizes verified against pychonet ActivityAmountSensor.py and ECHONET Lite Appendix.
eoj: [0x00, 0x2a, 0x01]
description: "Activity amount sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xb0
    name: detection_threshold_level
    help: "Detection threshold level"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x31: level_1
      0x32: level_2
      0x33: level_3
      0x34: level_4
      0x35: level_5
      0x36: level_6
      0x37: level_7
      0x38: level_8
  - epc: 0xb1
    name: activity_amount_detection_status
    help: "Activity amount detection status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: active
      0x42: inactive
  - epc: 0xe0
    name: measured_activity_amount_level
    help: "Measured activity amount level"
    size: 2
    scale: 1
    type: gauge
    ha_state_class: measurement

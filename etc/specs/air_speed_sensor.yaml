# Air speed sensor - ECHONET Object 0x001F01
# Sizes verified against pychonet AirSpeedSensor.py and ECHONET Lite Appendix (class 0x001F).
eoj: [0x00, 0x1f, 0x01]
description: "Air speed sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: measured_value_of_air_speed
    help: "Measured value of air speed (0.01 m/s)"
    size: 2
    scale: 0.01
    type: gauge
    ha_state_class: measurement
    ha_unit: "m/s"
  - epc: 0xe1
    name: air_flow_direction
    help: "Air flow direction (degrees 0-359)"
    size: 2
    scale: 1
    type: gauge
    ha_state_class: measurement
    ha_unit: "°"

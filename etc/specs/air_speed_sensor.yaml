# Auto-generated from pychonet class AirSpeedSensor.
eoj: [0x00, 0x1f, 0x01]
description: "Air speed sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: measured_value_of_air_speed
    help: "Measured value of air speed"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xe1
    name: air_flow_direction
    help: "Air flow direction"
    size: 0
    scale: 1
    type: gauge

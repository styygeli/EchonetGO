# Auto-generated from pychonet class BathroomDryer.
eoj: [0x02, 0x73, 0x01]
description: "Bathroom dryer"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0x90
    name: on_timer_based_reservation_setting_1
    help: "“ON timer-based reservation” setting 1"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: on
      0x42: off
  - epc: 0x94
    name: off_timer_based_reservation_setting
    help: "“OFF timer-based reservation” setting"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: on
      0x42: off
  - epc: 0xb0
    name: operation_setting
    help: "Operation setting"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: enum
    enum:
      0x00: stop
      0x10: ventilation
      0x20: prewarming
      0x30: heating
      0x40: drying
      0x50: circulation
      0x60: mistsauna
      0x61: watermist
  - epc: 0xb1
    name: ventilation_operation_setting
    help: "Ventilation operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb2
    name: bathroom_pre_warmer_operation_setting
    help: "Bathroom pre-warmer operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb3
    name: bathroom_heater_operation_setting
    help: "Bathroom heater operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb4
    name: bathroom_dryer_operation_setting
    help: "Bathroom dryer operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb5
    name: cool_air_circulator_operation_setting
    help: "Cool air circulator operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb6
    name: mist_sauna_operation_setting
    help: "Mist sauna operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xb7
    name: water_mist_operation_setting
    help: "Water mist operation setting"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xba
    name: measured_relative_bathroom_humidity
    help: "Measured relative bathroom humidity"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: humidity
    ha_state_class: measurement
    ha_unit: "%"
  - epc: 0xbb
    name: measured_bathroom_temperature
    help: "Measured bathroom temperature"
    size: 1
    scale: 1
    signed: true
    type: gauge
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xc2
    name: ventilation_air_flow_rate_setting
    help: "Ventilation air flow rate setting"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x31: level_1
      0x32: level_2
      0x33: level_3
      0x34: level_4
      0x35: level_5
      0x36: level_6
      0x37: level_7
      0x38: level_8
      0x41: auto
  - epc: 0xcf
    name: filter_cleaning_reminder_sign_setting
    help: "Filter cleaning reminder sign setting"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: on
      0x42: off
  - epc: 0xe0
    name: human_body_detection_status
    help: "Human body detection status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: on
      0x42: off
  - epc: 0xe1
    name: on_timer_based_reservation_setting_2
    help: "“ON timer-based reservation” setting 2"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x00: noreservation
      0x10: ventilationreservation
      0x20: prewarmingreservation
      0x30: heatingreservation
      0x40: dryingreservation
      0x50: circulationreservation
      0x60: mistsaunareservation
      0x61: watermistreservation

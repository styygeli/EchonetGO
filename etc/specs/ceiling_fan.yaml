# Auto-generated from pychonet class CeilingFan.
eoj: [0x01, 0x3a, 0x01]
description: "Ceiling fan"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xf1
    name: fan_direction
    help: "Fan direction"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: forward
      0x42: reverse
  - epc: 0xf2
    name: fan_fluctuation
    help: "Fan fluctuation"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: true
      0x31: false
  - epc: 0xf3
    name: light_power
    help: "Light Power"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xf4
    name: light_mode
    help: "Light Mode"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x42: normal
      0x43: night
  - epc: 0xf5
    name: light_brightness
    help: "Light Brightness"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xf6
    name: light_color
    help: "Light Color"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xf7
    name: nightlight_brightness
    help: "Nightlight Brightness"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x01: low
      0x32: medium
      0x64: high
  - epc: 0xfc
    name: fan_buzzer
    help: "Fan Buzzer"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: true
      0x31: false

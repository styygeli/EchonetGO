# CO2 sensor - ECHONET Object 0x001B01
# Sizes verified against pychonet CO2Sensor.py and ECHONET Lite Appendix (class 0x001B).
eoj: [0x00, 0x1b, 0x01]
description: "CO2 sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: measured_value_of_co2_concentration
    help: "Measured value of CO2 concentration (ppm)"
    size: 2
    scale: 1
    type: gauge
    ha_device_class: carbon_dioxide
    ha_state_class: measurement
    ha_unit: "ppm"

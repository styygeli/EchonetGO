# Electric energy sensor - ECHONET Object 0x002201
# Sizes verified against pychonet ElectricEnergySensor.py and ECHONET Lite Appendix (class 0x0022).
eoj: [0x00, 0x22, 0x01]
description: "Electric energy sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: cumulative_amounts_of_electric_energy
    help: "Cumulative amounts of electric energy (0.001 kWh)"
    size: 4
    scale: 0.001
    type: counter
    ha_device_class: energy
    ha_state_class: total_increasing
    ha_unit: "kWh"
  - epc: 0xe1
    name: medium_capacity_sensor_instantaneous_electric_energy
    help: "Medium-capacity sensor instantaneous electric energy (W)"
    size: 4
    scale: 1
    signed: true
    type: gauge
    ha_device_class: power
    ha_state_class: measurement
    ha_unit: "W"
  - epc: 0xe2
    name: small_capacity_sensor_instantaneous_electric_energy
    help: "Small-capacity sensor instantaneous electric energy (0.1W)"
    size: 2
    scale: 0.1
    signed: true
    type: gauge
    ha_device_class: power
    ha_state_class: measurement
    ha_unit: "W"
  - epc: 0xe3
    name: large_capacity_sensor_instantaneous_electric_energy
    help: "Large-capacity sensor instantaneous electric energy (kW)"
    size: 2
    scale: 1
    signed: true
    type: gauge
    ha_device_class: power
    ha_state_class: measurement
    ha_unit: "kW"
  - epc: 0xe4
    name: cumulative_amounts_of_electric_energy_measurement_log
    help: "Cumulative amounts of electric energy measurement log (composite, 48x4B)"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xe5
    name: effective_voltage_value
    help: "Effective voltage value (V)"
    size: 2
    scale: 1
    type: gauge
    ha_device_class: voltage
    ha_state_class: measurement
    ha_unit: "V"

# Auto-generated from pychonet class ElectricLock.
eoj: [0x02, 0x6f, 0x01]
description: "Electric lock"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: lock_setting_1
    help: "Lock setting 1"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: locked
      0x42: unlocked
  - epc: 0xe1
    name: lock_setting_2
    help: "Lock setting 2"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: locked
      0x42: unlocked
  - epc: 0xe2
    name: lock_status_of_door_guard
    help: "Lock status of door guard"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: locked
      0x42: unlocked
  - epc: 0xe3
    name: door_open_close_status
    help: "Door open/close status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: open
      0x42: closed
  - epc: 0xe4
    name: occupant_non_occupant_status
    help: "Occupant/non-occupant status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: occupant
      0x42: non_occupant
  - epc: 0xe5
    name: alarm_status
    help: "Alarm status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x40: normal
      0x41: break_open
      0x42: door_open
      0x43: maunal_unlocked
      0x44: tampered
  - epc: 0xe6
    name: auto_lock_mode_setting
    help: "Auto lock mode setting"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: on
      0x42: off
  - epc: 0xe7
    name: battery_level
    help: "Battery level"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x41: normal
      0x42: battery_replacement_notification

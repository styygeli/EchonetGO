# Electric vehicle charger/discharger - ECHONET Object 0x02A101
# Sizes verified against pychonet ElectricVehicleCharger.py and ECHONET Lite Appendix (class 0x02A1).
eoj: [0x02, 0xa1, 0x01]
description: "ElectricVehicleCharger"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xc5
    name: rated_charge_capacity
    help: "Rated charge capacity (W)"
    size: 4
    scale: 1
    type: gauge
    ha_device_class: power
    ha_state_class: measurement
    ha_unit: "W"
  - epc: 0xc7
    name: vehicle_connection_status
    help: "Vehicle connection and charging status"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: enum
    enum:
      0x30: vehicle_not_connected
      0x40: connected_to_vehicle_not_chargeable
      0x41: connected_to_vehicle_chargeable
      0x44: connected_to_vehicle_chargeable_status_unknown
      0xff: undetermined
  - epc: 0xc8
    name: charging_amount_setting
    help: "Charging amount setting (Wh)"
    size: 4
    scale: 1
    type: gauge
    ha_device_class: energy
    ha_state_class: measurement
    ha_unit: "Wh"
  - epc: 0xca
    name: remaining_capacity
    help: "Remaining capacity (Wh)"
    size: 2
    scale: 1
    type: gauge
    ha_device_class: energy
    ha_state_class: measurement
    ha_unit: "Wh"
  - epc: 0xcc
    name: charging_interface_type
    help: "Charging interface type"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: enum
    enum:
      0x10: ac_no_communication
      0x11: ac_cplt
      0x12: ac_hlc_charging_only
      0x21: dc_type_aa_charging_only
      0x31: dc_type_bb_charging_only
      0x41: dc_type_ee_charging_only
      0x51: dc_type_ff_charging_only
  - epc: 0xcd
    name: connection_confirmation
    help: "Connection confirmation"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x10: connection_confirmation
  - epc: 0xce
    name: cumulative_charge_electric_energy
    help: "Cumulative charge electric energy (Wh)"
    size: 4
    scale: 1
    type: counter
    ha_device_class: energy
    ha_state_class: total_increasing
    ha_unit: "Wh"
  - epc: 0xcf
    name: cumulative_discharge_electric_energy
    help: "Cumulative discharge electric energy (Wh)"
    size: 4
    scale: 1
    type: counter
    ha_device_class: energy
    ha_state_class: total_increasing
    ha_unit: "Wh"
  - epc: 0xd0
    name: rated_voltage
    help: "Rated voltage (V)"
    size: 4
    scale: 1
    type: gauge
  - epc: 0xd2
    name: rated_current
    help: "Rated current (0.1A)"
    size: 2
    scale: 0.1
    type: gauge
    ha_device_class: current
    ha_state_class: measurement
    ha_unit: "A"
  - epc: 0xd3
    name: measured_instantaneous_charge_discharge
    help: "Measured instantaneous charging/discharging (signed W)"
    size: 4
    scale: 1
    signed: true
    type: gauge
    ha_device_class: power
    ha_state_class: measurement
    ha_unit: "W"
  - epc: 0xd8
    name: cumulative_discharge_amount
    help: "Cumulative discharge amount (Wh)"
    size: 4
    scale: 1
    type: counter
    ha_device_class: energy
    ha_state_class: total_increasing
    ha_unit: "Wh"
  - epc: 0xd9
    name: cumulative_discharge_amount_reset
    help: "Cumulative discharge amount reset"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x00: reset
  - epc: 0xda
    name: charger_operation_status
    help: "Charger operation status"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: enum
    enum:
      0x40: other
      0x42: charging
      0x44: standby
      0x47: idle
  - epc: 0xe2
    name: remaining_battery_capacity
    help: "Remaining battery capacity (Wh)"
    size: 4
    scale: 1
    type: gauge
    ha_device_class: energy
    ha_state_class: measurement
    ha_unit: "Wh"
  - epc: 0xe4
    name: battery_state_of_charge
    help: "Battery state of charge (%)"
    size: 1
    scale: 1
    type: gauge
    ha_device_class: battery
    ha_state_class: measurement
    ha_unit: "%"
  - epc: 0xe6
    name: vehicle_id
    help: "Vehicle ID"
    size: 1
    scale: 1
    type: gauge
  - epc: 0xe7
    name: charging_discharging_amount_setting
    help: "Charging/discharging amount setting (Wh)"
    size: 4
    scale: 1
    type: gauge
    ha_device_class: energy
    ha_unit: "Wh"
  - epc: 0xeb
    name: charge_electric_energy_setting
    help: "Charge electric energy setting (Wh)"
    size: 4
    scale: 1
    type: gauge
    ha_device_class: energy
    ha_unit: "Wh"
  - epc: 0xed
    name: charge_current_setting
    help: "Charge current setting (0.1A)"
    size: 2
    scale: 0.1
    type: gauge
    ha_device_class: current
    ha_state_class: measurement
    ha_unit: "A"

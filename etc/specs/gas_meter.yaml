# Gas Meter (0x0282) — ECHONET Appendix E
# Measures cumulative gas consumption via pulse counting.
eoj: [0x02, 0x82, 0x01]
description: "Gas meter"
default_scrape_interval: 10m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status (0x30=ON, 0x31=OFF)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x30: on
      0x31: off
  - epc: 0xE0
    name: cumulative_gas_m3
    help: "Cumulative gas consumption in 0.001 m3."
    size: 4
    scale: 0.001
    type: counter
    ha_device_class: gas
    ha_state_class: total_increasing
    ha_unit: "m³"

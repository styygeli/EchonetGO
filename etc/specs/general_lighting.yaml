    size: 0
    scale: 1
    type: gauge
  - epc: 0xb1
    name: light_color_setting
    help: "Light color setting"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x40: other
      0x41: incandescent_lamp_color
      0x42: white
      0x43: daylight_white
      0x44: daylight_color

# Home Air Conditioner (Daikin, Mitsubishi MAC-900IF, etc.) - ECHONET Object 0x013001
# Verified against Mitsubishi LZ-000156 (AC-AC-A3-2) certification sheet.
eoj: [0x01, 0x30, 0x01]
description: "Home air conditioner"
default_scrape_interval: 1m

metrics:
  - epc: 0x8F
    name: power_saving_operation
    help: "Power saving operation setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: power_saving
      0x42: normal
  - epc: 0xB0
    name: operation_mode
    help: "Operation mode setting."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x40: other
      0x41: auto
      0x42: cool
      0x43: heat
      0x44: dry
      0x45: fan_only
  - epc: 0xB3
    name: set_temperature_celsius
    help: "Target temperature in °C (0-50). 0xFD=undefined (e.g. fan_only mode)."
    size: 1
    scale: 1
    type: gauge
    invalid: 0xFD
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xBB
    name: indoor_temperature_celsius
    help: "Indoor temperature in °C (signed). 0x7E=unable to measure."
    size: 0
    signed: true
    scale: 1
    type: gauge
    invalid: 0x7E
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xA0
    name: air_flow_rate
    help: "Air flow rate setting: 0x41=auto, 0x31-0x38=level 1-8."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: auto
      0x31: level_1
      0x32: level_2
      0x33: level_3
      0x34: level_4
      0x35: level_5
      0x36: level_6
      0x37: level_7
      0x38: level_8

# HA climate entity mapping (power/mode/temp/fan via 0x80, 0xB0, 0xB3, 0xBB, 0xA0)
climate:
  mode_epc: 0xB0
  temperature_epc: 0xB3
  current_temperature_epc: 0xBB
  fan_mode_epc: 0xA0
  min_temp: 16
  max_temp: 30
  temp_step: 1
  modes:
    "off": null
    "auto": 0x41
    "cool": 0x42
    "heat": 0x43
    "dry": 0x44
    "fan_only": 0x45

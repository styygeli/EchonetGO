# Mitsubishi MAC-900IF (LZ-000156, AC-AC-A3-2) — vendor-specific Home AC spec
# Manufacturer code 0x000006. Auto-selected when device reports this manufacturer.
# See echonet_specs/MITSUBISHI_MAC-900IF_LZ-000156_SPEC.md.
#
# Removed from generic spec: identification_number (0x83), standard_version (0x82),
# manufacturer_fault_code (0x86), manufacturer_code (0x8A). These are binary/structured
# data that produce nonsensical values when forced into numeric gauges. The useful info
# (UID, manufacturer name) is already captured in device identity fields.
eoj: [0x01, 0x30, 0x01]
description: "Home air conditioner (Mitsubishi MAC-900IF)"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status: 0x30=ON, 0x31=OFF."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0x81
    name: installation_location
    help: "Installation location (1B or 17B per Appendix)."
    size: 0
    scale: 1
    type: gauge
    scrape_interval: 10m
  # Mitsubishi does NOT follow the standard [unit(1B), counter(3B)] format for 0x85.
  # Both tested units return first byte 0x00 (not a valid unit code), so we treat the
  # full 4 bytes as a plain counter. Unit is unknown; empirically appears to be minutes.
  - epc: 0x85
    name: cumulative_operating_time
    help: "Cumulative operating time (raw counter; Mitsubishi non-standard format, unit unknown)."
    size: 4
    scale: 1
    type: counter
    scrape_interval: 1h
  - epc: 0x88
    name: fault_status
    help: "Fault status."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: fault
      0x42: no_fault
  - epc: 0x89
    name: fault_description
    help: "Fault description (2B per Appendix)."
    size: 2
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0x8B
    name: business_facility_code
    help: "Business facility code."
    size: 2
    scale: 1
    type: gauge
    scrape_interval: 24h
  - epc: 0x8F
    name: power_saving_operation
    help: "Power saving operation setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: power_saving
      0x42: normal
  - epc: 0x93
    name: remote_control_setting
    help: "Remote control setting (Get may be unsupported on some units)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xA0
    name: air_flow_rate
    help: "Air flow rate: 0x41=auto, 0x31-0x38=level 1-8."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: auto
      0x31: level_1
      0x32: level_2
      0x33: level_3
      0x34: level_4
      0x35: level_5
      0x36: level_6
      0x37: level_7
      0x38: level_8
  - epc: 0xA1
    name: auto_air_flow_direction
    help: "Auto air flow direction setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: auto
      0x42: non_auto
  - epc: 0xA3
    name: air_flow_swing
    help: "Air flow swing setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x31: off
      0x41: vertical
      0x42: horizontal
      0x43: both
  - epc: 0xA4
    name: air_flow_direction_horizontal
    help: "Air flow direction (horizontal)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xA5
    name: air_flow_direction_vertical
    help: "Air flow direction (vertical)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xB0
    name: operation_mode
    help: "Operation mode setting."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x40: other
      0x41: auto
      0x42: cool
      0x43: heat
      0x44: dry
      0x45: fan_only
  - epc: 0xB3
    name: set_temperature_celsius
    help: "Target temperature in °C (0-50). 0xFD=undefined (e.g. fan_only mode)."
    size: 1
    scale: 1
    type: gauge
    invalid: 0xFD
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xBB
    name: indoor_temperature_celsius
    help: "Indoor temperature in °C (signed). 0x7E=unable to measure."
    size: 1
    signed: true
    scale: 1
    type: gauge
    invalid: 0x7E
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xD0
    name: thermostat_state
    help: "Special state / thermostat state."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m

# Mitsubishi MAC-900IF (LZ-000156, AC-AC-A3-2) — vendor-specific Home AC spec
# Manufacturer code 0x000006. Auto-selected when device reports this manufacturer.
# See echonet_specs/MITSUBISHI_MAC-900IF_LZ-000156_SPEC.md.
#
# Removed from generic spec: identification_number (0x83), standard_version (0x82),
# manufacturer_fault_code (0x86), manufacturer_code (0x8A). These are binary/structured
# data that produce nonsensical values when forced into numeric gauges. The useful info
# (UID, manufacturer name) is already captured in device identity fields.
eoj: [0x01, 0x30, 0x01]
description: "Home air conditioner (Mitsubishi MAC-900IF)"
default_scrape_interval: 1m

metrics:
  # Mitsubishi does NOT follow the standard [unit(1B), counter(3B)] format for 0x85.
  # Both tested units return first byte 0x00 (not a valid unit code), so we treat the
  # full 4 bytes as a plain counter. Unit is unknown; empirically appears to be minutes.
  - epc: 0x85
    name: cumulative_operating_time
    help: "Cumulative operating time (raw counter; Mitsubishi non-standard format, unit unknown)."
    size: 4
    scale: 1
    type: counter
    scrape_interval: 1h
  - epc: 0x89
    name: fault_description
    help: "Fault description (2B per Appendix)."
    size: 2
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0x8B
    name: business_facility_code
    help: "Business facility code."
    size: 2
    scale: 1
    type: gauge
    scrape_interval: 24h
  - epc: 0x8F
    name: power_saving_operation
    help: "Power saving operation setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: power_saving
      0x42: normal
  - epc: 0x93
    name: remote_control_setting
    help: "Remote control setting (Get may be unsupported on some units)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xA0
    name: air_flow_rate
    help: "Air flow rate: 0x41=auto, 0x31-0x38=level 1-8."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: auto
      0x31: level_1
      0x32: level_2
      0x33: level_3
      0x34: level_4
      0x35: level_5
      0x36: level_6
      0x37: level_7
      0x38: level_8
  - epc: 0xA1
    name: auto_air_flow_direction
    help: "Auto air flow direction setting. 0x42=manual position, 0x43=full auto (MAC-900IF)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: auto
      0x42: non_auto
      0x43: full_auto
  # On MAC-900IF: vertical swing only. 0x31=off, 0x41=auto swing. Horizontal/both not used.
  - epc: 0xA3
    name: air_flow_swing
    help: "Air flow swing (on this device: vertical swing on/off)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x31: off
      0x41: vertical
      0x42: horizontal
      0x43: both
  # On MAC-900IF: 0xA4 = vertical blade position (ceiling→floor). Order: 41→44→43→45→42. Updates when blade
  # reaches the position, not during movement. During vertical swing (0xA3=41), 0xA4 does not track live position.
  - epc: 0xA4
    name: air_flow_direction_horizontal
    help: "On MAC-900IF: vertical blade position (air toward ceiling → floor). Value updates on arrival, not while moving."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: uppermost
      0x44: upper_mid
      0x43: middle
      0x45: lower_mid
      0x42: lowermost
  # On MAC-900IF: Get returns empty EDT; vertical position is reported in 0xA4 instead.
  - epc: 0xA5
    name: air_flow_direction_vertical
    help: "Air flow direction vertical (standard). On MAC-900IF: not reported (empty)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xB0
    name: operation_mode
    help: "Operation mode setting."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x40: other
      0x41: auto
      0x42: cool
      0x43: heat
      0x44: dry
      0x45: fan_only
  - epc: 0xB3
    name: set_temperature_celsius
    help: "Target temperature in °C (0-50). 0xFD=undefined (e.g. fan_only mode)."
    size: 1
    scale: 1
    type: gauge
    invalid: 0xFD
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xBB
    name: indoor_temperature_celsius
    help: "Indoor temperature in °C (signed). 0x7E=unable to measure."
    size: 1
    signed: true
    scale: 1
    type: gauge
    invalid: 0x7E
    ha_device_class: temperature
    ha_state_class: measurement
    ha_unit: "°C"
  - epc: 0xD0
    name: thermostat_state
    help: "Special state / thermostat state."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m

# HA climate entity mapping (same EPCs as generic home_ac)
climate:
  mode_epc: 0xB0
  temperature_epc: 0xB3
  current_temperature_epc: 0xBB
  fan_mode_epc: 0xA0
  min_temp: 16
  max_temp: 30
  temp_step: 1
  modes:
    "off": null
    "auto": 0x41
    "cool": 0x42
    "heat": 0x43
    "dry": 0x44
    "fan_only": 0x45

# Auto-generated from pychonet class LowVoltageSmartElectricEnergyMeter.
eoj: [0x02, 0x88, 0x01]
description: "Low voltage smart electric energy meter"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 0
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xd3
    name: coefficient
    help: "Coefficient"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xd7
    name: number_of_effective_digits_for_cumulative_amounts_of_electric_energy
    help: "Number of effective digits for cumulative amounts of electric energy"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xe1
    name: unit_for_cumulative_amounts_of_electric_energy_normal_and_reverse_directions
    help: "Unit for cumulative amounts of electric energy (normal and reverse directions)"
    size: 0
    scale: 1
    type: gauge

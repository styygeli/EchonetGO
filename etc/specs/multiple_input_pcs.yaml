  - epc: 0xe3
    name: measured_cumulative_amount_of_electric_energy_reverse_direction
    help: "Measured cumulative amount of electric energy (reverse direction)"
    size: 0
    scale: 1
    type: gauge
  - epc: 0xe7
    name: measured_instantaneous_amount_of_electricity
    help: "Measured instantaneous amount of electricity"
    size: 0
    scale: 1
    signed: true
    type: gauge

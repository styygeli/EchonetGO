# Power Distribution Board Metering (0x0287) — ECHONET Appendix E
# Panasonic Smart Cosmo and similar residential distribution boards.
# Per-circuit EPCs (0xD0-0xEF) return 8 bytes; size: 4 extracts the first int32.
# Power values are in deciwatts (0.1 W); scale: 0.1 converts to watts.
eoj: [0x02, 0x87, 0x01]
description: "Power distribution board metering"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status (0x30=ON, 0x31=OFF)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x30: on
      0x31: off
  - epc: 0x88
    name: fault_status
    help: "Fault status."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: fault
      0x42: no_fault
  - epc: 0xB0
    name: wiring_config
    help: "Wiring system configuration (0x00=single-phase 3-wire, etc.)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 24h
  - epc: 0xB8
    name: ct_channel_count
    help: "Number of CT measurement channels."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 24h
  - epc: 0xC0
    name: instantaneous_power_w
    help: "Total instantaneous electric power in W (measured at main breaker)."
    size: 4
    signed: true
    scale: 0.1
    type: gauge
  - epc: 0xC1
    name: instantaneous_current_raw
    help: "Total instantaneous current (aggregate, format depends on wiring config)."
    size: 4
    scale: 0.1
    type: gauge
  - epc: 0xC6
    name: cumulative_energy_normal_raw
    help: "Cumulative electric energy normal direction."
    size: 4
    signed: true
    scale: 0.1
    type: counter
    scrape_interval: 10m
  - epc: 0xC7
    name: cumulative_energy_reverse_raw
    help: "Cumulative electric energy reverse direction."
    size: 4
    signed: true
    scale: 0.1
    type: counter
    scrape_interval: 10m
  # Per-circuit instantaneous power (first 4 bytes of 8-byte EDT, in deciwatts)
  - epc: 0xD0
    name: circuit_01_power_w
    help: "Circuit 1 instantaneous power in W."
    size: 4
    signed: true
    scale: 0.1
    type: gauge
  - epc: 0xD1
    name: circuit_02_power_w
    help: "Circuit 2 instantaneous power in W."
    size: 4
    signed: true

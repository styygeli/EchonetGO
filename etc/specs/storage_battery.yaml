# Storage Battery (EP Cube, etc.) - ECHONET Object 0x027D01
eoj: [0x02, 0x7D, 0x01]
description: "EP Cube / storage battery"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status (0x30=ON, 0x31=OFF)."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0x88
    name: fault_status
    help: "Fault status."
    size: 1
    scale: 1
    type: gauge
    enum:
      0x41: fault
      0x42: no_fault
  - epc: 0xE4
    name: state_of_capacity_percent
    help: "Battery state of charge (0-100%)."
    size: 1
    scale: 1
    type: gauge
  - epc: 0xE7
    name: charge_discharge_power_watts
    help: "Instantaneous charge (+) or discharge (-) power in watts."
    size: 4
    signed: true
    scale: 1
    type: gauge
  - epc: 0xD3
    name: measured_instantaneous_charge_discharge_raw
    help: "Measured instantaneous charging/discharging value (signed)."
    size: 0
    signed: true
    scale: 1
    type: gauge
  - epc: 0xE2
    name: remaining_capacity_wh
    help: "Remaining stored electricity in Wh."
    size: 4
    scale: 1
    type: gauge
  - epc: 0xA2
    name: chargeable_capacity_wh
    help: "AC chargeable capacity in Wh."
    size: 4
    scale: 1
    type: gauge
  - epc: 0xA3
    name: dischargeable_capacity_wh
    help: "AC dischargeable capacity in Wh."
    size: 4
    scale: 1
    type: gauge
  - epc: 0xA0
    name: effective_capacity_charging_wh
    help: "AC effective capacity while charging."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xA1
    name: effective_capacity_discharging_wh
    help: "AC effective capacity while discharging."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xA4
    name: chargeable_energy_wh
    help: "AC chargeable electric energy."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xA5
    name: dischargeable_energy_wh
    help: "AC dischargeable electric energy."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xA6
    name: charge_upper_limit_setting
    help: "AC charge upper limit setting."
    size: 0
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xA7
    name: discharge_lower_limit_setting
    help: "AC discharge lower limit setting."
    size: 0
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xA8
    name: cumulative_charge_wh
    help: "Cumulative AC charge amount in Wh."
    size: 4
    scale: 1
    type: counter
    scrape_interval: 5m
  - epc: 0xA9
    name: cumulative_discharge_wh
    help: "Cumulative AC discharge amount in Wh."
    size: 4
    scale: 1
    type: counter
    scrape_interval: 5m
  - epc: 0xAA
    name: charge_amount_setting_value
    help: "AC charge amount setting value."
    size: 0
    scale: 1
    type: gauge
    scrape_interval: 10m
  - epc: 0xAB
    name: discharge_amount_setting_value
    help: "AC discharge amount setting value."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xC1
    name: charging_method
    help: "Charging method."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x00: other
      0x01: maximum
      0x02: surplus
      0x03: designated_power
      0x04: designated_current
  - epc: 0xC2
    name: discharging_method
    help: "Discharging method."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x00: other
      0x01: maximum
      0x02: load_following
      0x03: designated_power
      0x04: designated_current
  - epc: 0xCF
    name: working_operation_state
    help: "Working operation: 0x42=Charging, 0x43=Discharging, 0x44=Standby."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x40: other
      0x41: rapid_charging
      0x42: charging
      0x43: discharging
      0x44: standby
      0x45: test
      0x46: auto
      0x48: restart
      0x49: capacity_recalculation
  - epc: 0xDA
    name: operation_mode_setting
    help: "Operation mode setting."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x40: other
      0x41: rapid_charging
      0x42: charging
      0x43: discharging
      0x44: standby
      0x45: test
      0x46: auto
      0x48: restart
      0x49: capacity_recalculation
  - epc: 0xDB
    name: system_interconnected_type
    help: "System-interconnected type."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x00: reverse_power_flow_acceptable
      0x01: independent
      0x02: reverse_power_flow_not_acceptable
  - epc: 0xE3
    name: remaining_capacity_wh_alt
    help: "Remaining stored electricity (alternate field)."
    size: 0
    scale: 1
    type: gauge
  - epc: 0xE6
    name: battery_type
    help: "Battery type."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x00: unknown
      0x01: lead
      0x02: ni_mh
      0x03: ni_cd
      0x04: lithium
      0x05: zinc
      0x06: alkaline

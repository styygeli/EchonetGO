# Water Flow Meter (0x0281) — ECHONET Appendix E
# Measures cumulative water consumption via pulse counting.
eoj: [0x02, 0x81, 0x01]
description: "Water flow meter"
default_scrape_interval: 10m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status (0x30=ON, 0x31=OFF)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x30: on
      0x31: off
  - epc: 0x88
    name: fault_status
    help: "Fault status."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 10m
    enum:
      0x41: fault
      0x42: no_fault
  - epc: 0xE0
    name: cumulative_flow_m3
    help: "Cumulative water flow in m3 (unit determined by 0xE1)."
    size: 4
    scale: 1
    type: counter
  - epc: 0xE1
    name: flow_rate_unit
    help: "Unit for flow measurement (0x00=m3, 0x01=L, 0x02=gal, 0x03=0.001m3)."
    size: 1
    scale: 1
    type: gauge
    scrape_interval: 24h

# Water flow rate sensor - ECHONET Object 0x002501
# Sizes verified against pychonet WaterFlowSensor.py and ECHONET Lite Appendix (class 0x0025).
eoj: [0x00, 0x25, 0x01]
description: "Water flow rate sensor"
default_scrape_interval: 1m

metrics:
  - epc: 0x80
    name: operation_status
    help: "Operation status"
    size: 1
    scale: 1
    type: gauge
    enum:
      0x30: on
      0x31: off
  - epc: 0xe0
    name: cumulative_flow_rate
    help: "Cumulative flow rate (0.001 m³)"
    size: 4
    scale: 0.001
    type: counter
    ha_state_class: total_increasing
    ha_unit: "m³"
  - epc: 0xe2
    name: flow_rate
    help: "Instantaneous flow rate"
    size: 2
    scale: 1
    type: gauge
    ha_state_class: measurement
